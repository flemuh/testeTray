name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  quality:
    runs-on: ubuntu-latest
    # Define que todos os comandos 'run' rodarão dentro da pasta api
    defaults:
      run:
        working-directory: ./api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3' # Nota: Verifique se a 8.5 já está estável/disponível no runner
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: api/vendor # Ajustado o caminho para o cache
          key: ${{ runner.os }}-php-8.3-${{ hashFiles('api/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.3-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run quality
        run: composer quality