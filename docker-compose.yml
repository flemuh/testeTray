services:
  mysql:
    image: mysql:8.4
    container_name: tray_mysql
    restart: unless-stopped
    environment:
      CHOKIDAR_USEPOLLING: true
      WATCHER_USE_POLLING: true
      MYSQL_DATABASE: tray_test
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: tray_api
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
      - tray_vendor:/var/www/html/vendor
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: tray_test
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    command: ["/entrypoint.sh"]

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: tray_web
    restart: unless-stopped
    working_dir: /app
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./web:/app
      - tray_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  queue:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: tray_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
      - tray_vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: tray_test
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
      api:
        condition: service_started
    command: ["/entrypoint-queue.sh"]

volumes:
  mysql_data:
  tray_vendor:
  tray_node_modules: